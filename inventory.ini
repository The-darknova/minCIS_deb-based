# debian-hardening/inventory.ini
#
# IMPORTANT: Please update the connection details, host IPs, and users below 
# according to your specific environment.
#
# SECURITY RECOMMENDATION: It is highly recommended to use Ansible Vault 
# to store sensitive data such as 'ansible_ssh_pass' and 'ansible_become_pass' 
# instead of leaving them in plain text in this file.

[all:vars]
ansible_connection=ssh

# ==========================================
# 1. Host Definitions
# ==========================================
# Define individual servers and their connection details.
# Replace IP addresses and users with your actual environment details.

[test_nodes]
ubuntu_hardening_test-ansible ansible_host=192.148.100.101 ansible_user=danny

[production_nodes]
web-prod-01 ansible_host=10.0.0.50 ansible_user=admin

# ==========================================
# 2. Meta-Groups (Children)
# ==========================================
# Group all Debian servers together so the master playbook can target them all at once.

[debian_servers:children]
test_nodes
production_nodes

# ==========================================
# 3. Group-Specific Variables
# ==========================================
# You can override the global variables from group_vars/all.yml right here in the inventory.

[test_nodes:vars]
# Example: Disable the strict UFW default drop policy during initial sandbox testing
# so you don't accidentally lock yourself out while debugging.
# hardening_ufw_enable=false

[production_nodes:vars]
# Production enforces all strict controls by default.
# Leave empty to inherit all 'true' values from group_vars/all.yml.
