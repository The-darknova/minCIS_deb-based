---
# Role: auth_ssh
- name: Legal Banner Deployment
  when: hardening_legal_banner | bool
  block:
    - name: Deploy the legal banner text to motd and issue files
      ansible.builtin.copy:
        dest: "{{ item }}"
        content: |
          *******************************************************************************
          AVERTISSEMENT: Accès autorisé uniquement.
          Ce système est surveillé à des fins de sécurité. Tout accès ou utilisation
          non autorisé(e) de ce système est interdit(e) et peut entraîner des sanctions
          pénales ou civiles.
          
          https://changeme.com
          *******************************************************************************
        mode: '0644'
        owner: root
        group: root
      loop:
        - /etc/motd
        - /etc/issue
        - /etc/issue.net

- name: SSH Hardening
  when: hardening_ssh_secure | bool
  block:
    - name: Deploy custom sshd_config settings
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/06-ssh-hardening.conf
        content: |
          Banner /etc/issue.net
          PermitRootLogin no
          PermitEmptyPasswords no
          PasswordAuthentication yes
          MaxAuthTries 4
          ClientAliveInterval 30
          ClientAliveCountMax 3
          LoginGraceTime 60
          X11Forwarding no
          AllowTcpForwarding no
          IgnoreRhosts yes
          HostbasedAuthentication no
          UsePAM yes
          PermitUserEnvironment no
          DisableForwarding yes
          MaxStartups 10:30:60
          LogLevel VERBOSE
          Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
          MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
          KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group14-sha256,diffie-hellman-group16-sha512
        mode: '0600'
        owner: root
        group: root
      notify: Restart SSH

    - name: Fix permissions on main sshd config file
      ansible.builtin.file:
        path: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: 'u-x,og-rwx'

- name: Sudo Hardening
  when: hardening_sudo_secure | bool
  block:
    - name: Configure sudo logging and pty
      ansible.builtin.copy:
        dest: /etc/sudoers.d/00-cis-hardening
        content: |
          Defaults use_pty
          Defaults logfile="/var/log/sudo.log"
        mode: '0440'
        owner: root
        group: root
        validate: 'visudo -cf %s'

- name: PAM and Password Policies Hardening
  when: hardening_pam_secure | bool
  block:
    - name: Install PAM security modules
      ansible.builtin.apt:
        name:
          - libpam-pwquality
          - libpam-modules
          - cracklib-runtime
        state: present

    - name: Ensure pwquality.conf.d directory exists
      ansible.builtin.file:
        path: /etc/security/pwquality.conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure password complexity rules
      ansible.builtin.copy:
        dest: /etc/security/pwquality.conf.d/60-hardening-pw.conf
        content: |
          difok = 2
          minlen = 14
          minclass = 3
          dcredit = -1
          ucredit = -1
          ocredit = -1
          lcredit = -1
          maxrepeat = 3
          maxsequence = 3
          dictcheck = 1
          enforce_for_root = yes
        mode: '0644'
        owner: root
        group: root

    - name: Enforce password expiration in login.defs
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^PASS_MAX_DAYS', line: 'PASS_MAX_DAYS 90' }
        - { regexp: '^PASS_MIN_DAYS', line: 'PASS_MIN_DAYS 1' }

    - name: Remove nullok from PAM configurations
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '\s+nullok(_secure)?'
        replace: ''
      loop:
        - /etc/pam.d/common-auth
        - /etc/pam.d/common-password

    - name: Ensure permissions on shadow and gshadow files are configured
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: shadow
        mode: '0640'
      loop:
        - /etc/shadow
        - /etc/shadow-
        - /etc/gshadow
        - /etc/gshadow-

    - name: Ensure permissions on /etc/shells are configured
      ansible.builtin.file:
        path: /etc/shells
        owner: root
        group: root
        mode: '0644'

    - name: Ensure permissions on /etc/security/opasswd are configured
      ansible.builtin.file:
        path: /etc/security/opasswd
        owner: root
        group: root
        mode: '0600'
        state: touch

- name: PAM Account Lockout Hardening (Faillock)
  when: hardening_pam_faillock | bool
  block:
    - name: Install PAM faillock module
      ansible.builtin.apt:
        name: libpam-modules
        state: present

    - name: Configure faillock settings
      ansible.builtin.copy:
        dest: /etc/security/faillock.conf
        content: |
          deny = 5
          unlock_time = 900
          even_deny_root
        mode: '0644'
        owner: root
        group: root

    - name: Remove old broken faillock profiles
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/share/pam-configs/faillock
        - /usr/share/pam-configs/faillock_notify

    - name: Create unified faillock preauth profile
      ansible.builtin.copy:
        dest: /usr/share/pam-configs/faillock_preauth
        content: |
          Name: Faillock pre-auth check
          Default: yes
          Priority: 1024
          Auth-Type: Primary
          Auth:
              required pam_faillock.so preauth silent deny=5 unlock_time=900
        mode: '0644'
        owner: root
        group: root

    - name: Create unified faillock authfail profile
      ansible.builtin.copy:
        dest: /usr/share/pam-configs/faillock_authfail
        content: |
          Name: Faillock authfail processing
          Default: yes
          Priority: 0
          Auth-Type: Primary
          Auth:
              [default=die] pam_faillock.so authfail
        mode: '0644'
        owner: root
        group: root

    - name: Force update of PAM configuration files
      ansible.builtin.command: pam-auth-update --package
      changed_when: true

- name: PAM Password History Hardening (pwhistory)
  when: hardening_pam_pwhistory | bool
  block:
    - name: Configure pwhistory profile
      ansible.builtin.copy:
        dest: /usr/share/pam-configs/pwhistory
        content: |
          Name: pwhistory
          Default: yes
          Priority: 1024
          Password-Type: Primary
          Password:
            requisite pam_pwhistory.so remember=24 enforce_for_root use_authtok
        mode: '0644'
        owner: root
        group: root

    - name: Enable pwhistory in PAM via pam-auth-update
      ansible.builtin.command: pam-auth-update --enable pwhistory
      register: pwhistory_output
      changed_when: "'changed' in pwhistory_output.stdout or pwhistory_output.rc == 0"

- name: Profile Security Hardening
  when: hardening_profile_secure | bool
  block:
    - name: Deploy secure profile defaults (TMOUT and umask)
      ansible.builtin.copy:
        dest: /etc/profile.d/99-hardening.sh
        content: |
          readonly TMOUT=900
          export TMOUT
          umask 027
        mode: '0644'
        owner: root
        group: root
