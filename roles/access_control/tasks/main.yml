---
# Role: access_control
- name: AppArmor Installation and Enforcement
  when: hardening_apparmor_enable | bool
  block:
    - name: Install AppArmor utilities
      ansible.builtin.apt:
        name:
          - apparmor
          - apparmor-utils
        state: present

    - name: Enable AppArmor in GRUB
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX="(?!.*apparmor=1)(.*)"$'
        replace: 'GRUB_CMDLINE_LINUX="\1 apparmor=1 security=apparmor"'
      notify: Update GRUB

    - name: Enforce all AppArmor profiles
      ansible.builtin.command: aa-enforce /etc/apparmor.d/*
      register: aa_enforce_output
      changed_when: "'Enforcing' in aa_enforce_output.stdout or 'changed' in aa_enforce_output.stdout"
      ignore_errors: true

    - name: Restrict unprivileged AppArmor namespace
      ansible.posix.sysctl:
        name: kernel.apparmor_restrict_unprivileged_unconfined
        value: '1'
        sysctl_file: /etc/sysctl.d/60-apparmor-namespace.conf
        state: present
        reload: yes
        ignore_errors: true

- name: Auditd Installation and Enforcement
  when: hardening_auditd_enable | bool
  block:
    - name: Install auditd and plugins
      ansible.builtin.apt:
        name:
          - auditd
          - audispd-plugins
        state: present

    - name: Enable and start auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: yes
        state: started
      ignore_errors: true

    - name: Enable Auditd in GRUB
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX="(?!.*audit=1)(.*)"$'
        replace: 'GRUB_CMDLINE_LINUX="\1 audit=1"'
      notify: Update GRUB

    - name: Ensure audit_backlog_limit is sufficient
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX="(?!.*audit_backlog_limit=8192)(.*)"$'
        replace: 'GRUB_CMDLINE_LINUX="\1 audit_backlog_limit=8192"'
      notify: Update GRUB

    - name: Ensure audit logs are not automatically deleted
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^max_log_file_action\s*='
        line: 'max_log_file_action = keep_logs'
        state: present
      notify: Restart Auditd

    - name: Ensure system warns when audit logs are low on space
      when: hardening_auditd_space_warn | bool
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^{{ item.key }}\s*='
        line: '{{ item.key }} = {{ item.value }}'
        state: present
      loop:
        - { key: 'space_left_action', value: 'email' }
        - { key: 'action_mail_acct', value: 'root' }
        - { key: 'admin_space_left_action', value: 'halt' }
      notify: Restart Auditd

    - name: Deploy CIS auditd rules
      ansible.builtin.copy:
        src: 60-cis-auditd.rules
        dest: /etc/audit/rules.d/60-cis-auditd.rules
        mode: '0640'
        owner: root
        group: root
      notify: Restart Auditd

- name: Journald Configuration
  block:
    - name: Ensure journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Deploy CIS journald configuration
      ansible.builtin.copy:
        src: 60-cis-journald.conf
        dest: /etc/systemd/journald.conf.d/60-cis-journald.conf
        mode: '0644'
        owner: root
        group: root
      notify: Restart Journald
